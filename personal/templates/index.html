{% extends 'base.html' %}

{% block title %}Home - Portfolio{% endblock %}

{% block content %}
<section class="flex h-screen text-center relative">
    <!-- Left: Full-Screen Profile Image -->
    <div class="w-1/2 h-screen m-0 p-0">
        <img src="{{ portfolio.profile_image.url }}" 
             class="w-full h-full object-cover" 
             alt="Profile Image">
    </div>

    <!-- Right: Text Content (Near Footer) -->
    <div class="w-1/2 flex flex-col justify-end text-left pl-16 pr-12 pb-12">
        <h1 class="text-5xl font-extrabold text-teal-400 opacity-0">Madhav Nepal</h1>
        <p class="text-2xl text-gray-300 mt-4 opacity-0">{{ portfolio.job_title }}</p>
        <button class="mt-6 px-8 py-3 bg-teal-500 hover:bg-teal-400 text-white font-bold rounded-lg shadow-lg transition-transform transform hover:scale-110 opacity-0">
            Get in Touch
        </button>
    </div>
</section>

<!-- GSAP Animations -->
<script>
    gsap.from("h1", {
        duration: 1, opacity: 0, y: 50, ease: "power2.out", delay: 0.5
    });

    gsap.from("p", {
        duration: 1, opacity: 0, y: 50, ease: "power2.out", delay: 0.8
    });

    gsap.from("button", {
        duration: 1, opacity: 0, y: 50, scale: 0.8, ease: "back.out(1.7)", delay: 1.2
    });

    gsap.from("img", {
        duration: 1, scale: 1.1, opacity: 0, delay: 0.5, ease: "power2.out"
    });
</script>
{% endblock %}
