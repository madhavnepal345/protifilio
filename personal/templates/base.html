<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gray-900 text-white transition duration-300">
    <nav class="bg-gray-800 p-4 fixed w-full z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-400">My Portfolio</a>
            <ul class="flex space-x-6">
                <li><a href="/" class="hover:text-blue-400">Home</a></li>
                <li><a href="/about/" class="hover:text-blue-400">About</a></li>
                <li><a href="/projects/" class="hover:text-blue-400">Projects</a></li>
                <li><a href="/contact/" class="hover:text-blue-400">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="pt-20">
        {% block content %} {% endblock %}
    </div>

    <button id="toggle-theme" class="fixed bottom-5 right-5 px-4 py-2 bg-gray-700 text-white rounded-lg">🌙</button>

    <footer class="bg-gray-800 text-center py-4 mt-10">
        <p>&copy; 2025 Your Name. All rights reserved.</p>
    </footer>

    <script src="/static/js/scripts.js"></script>
</body>
</html>
