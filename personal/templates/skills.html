<!-- skills.html -->

{% extends 'base.html' %}

{% block content %}
    <section id="skills" class="py-10 px-5">
        <h2 class="text-3xl font-bold text-center mb-8">Skills</h2>
        <div class="container">
            <div class="row">
                {% for skill in skills %}
                    <div class="col-md-4 mb-4">
                        <div class="card bg-dark text-white">
                            <div class="card-body">
                                <h3 class="card-title text-xl font-semibold">{{ skill.name }}</h3>
                                <p class="card-text">{{ skill.percentage }}</p>
                                {% if skill.icon %}
                                    <i class="{{ skill.icon }} text-2xl"></i> 
                                {% endif %}
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </section>
{% endblock %}
