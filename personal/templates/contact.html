{% extends 'base.html' %}
{% block title %}Contact - Portfolio{% endblock %}
{% block content %}

<section class="py-20 px-6 text-center">
    <h2 class="text-3xl font-bold">Contact Me</h2>
    <form method="POST" class="max-w-lg mx-auto mt-8 p-6 bg-gray-800 rounded-lg shadow-lg">
        {% csrf_token %}
        <div class="mb-4">
            <input type="text" name="name" placeholder="Your Name" class="w-full p-3 rounded bg-gray-700">
        </div>
        <div class="mb-4">
            <input type="email" name="email" placeholder="Your Email" class="w-full p-3 rounded bg-gray-700">
        </div>
        <div class="mb-4">
            <textarea name="message" placeholder="Your Message" class="w-full p-3 rounded bg-gray-700"></textarea>
        </div>
        <button type="submit" class="px-6 py-3 bg-blue-400 text-white rounded-lg">Send Message</button>
    </form>
</section>

{% endblock %}
