{% extends 'base.html' %}

{% block title %}Resume - Portfolio{% endblock %}

{% block content %}
<section class="flex flex-col items-center justify-center min-h-screen px-6 text-center">
    <h1 class="text-5xl font-bold text-teal-400 mb-6">My Resume</h1>

    {% if portfolio.resume %}
        <iframe src="{{ portfolio.resume.url }}" class="w-3/4 h-[600px] border-2 border-teal-500 shadow-lg rounded-lg"></iframe>
        <a href="{{ portfolio.resume.url }}" class="mt-4 bg-teal-500 hover:bg-teal-400 text-white font-bold px-6 py-3 rounded-lg shadow-lg transition-transform transform hover:scale-110" download>
            Download Resume
        </a>
    {% else %}
        <p class="text-xl text-gray-300">Resume not uploaded yet.</p>
    {% endif %}
</section>
{% endblock %}
